<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drawing Tablet Lag Animator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2a2a2a;
    color: #eee;
    font-family: 'Google Sans Flex', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 1.4rem;
    margin-bottom: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  canvas {
    border-radius: 8px;
    cursor: default;
    display: block;
  }
  .controls {
    display: flex;
    gap: 32px;
    align-items: center;
    margin-top: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .slider-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .slider-group label {
    font-size: 0.85rem;
    font-weight: 600;
  }
  .slider-group .value {
    font-size: 0.75rem;
    color: #aaa;
  }
  input[type="range"] {
    width: 200px;
    accent-color: #e07040;
  }
  .main-row {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 10px 0;
  }
  .legend {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 0.82rem;
    font-weight: 600;
    color: #aaa;
    white-space: nowrap;
  }
  .legend-spacer {
    height: 6px;
  }
  .checkboxes {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .checkboxes label {
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
</style>
</head>
<body>
<h1>Drawing Tablet Lag Visualizer</h1>
<div class="main-row">
  <div class="side-panel">
    <div class="legend">
      <div>a: pen tip</div>
      <div>b: OS pointer</div>
      <div>c: brush stroke</div>
      <div class="legend-spacer"></div>
      <div>a → b = pointer latency + smoothing</div>
      <div>b → c = brush latency + smoothing</div>
    </div>
    <div class="checkboxes">
<label><input type="checkbox" id="showA" checked> Label a</label>
      <label><input type="checkbox" id="showB" checked> Label b</label>
      <label><input type="checkbox" id="showC" checked> Label c</label>
      <label><input type="checkbox" id="showPointer" checked> OS pointer</label>
      <label style="padding-left: 16px;">
        <select id="pointerStyle" style="font-size: 0.8rem; font-family: inherit;">
          <option value="mouse">Mouse</option>
          <option value="crosshair">Crosshair</option>
        </select>
      </label>
      <label><input type="checkbox" id="showCircleA" checked> Circle a</label>
      <label><input type="checkbox" id="showCircleB" checked> Circle b</label>
      <label><input type="checkbox" id="showCircleC" checked> Circle c</label>
    </div>
  </div>
  <canvas id="c"></canvas>
</div>
<div class="controls">
  <div class="slider-group">
    <label>Pointer Latency (a → b)</label>
    <input type="range" id="pointerLatency" min="0" max="80" value="25">
    <span class="value" id="pointerLatencyVal">25</span>
  </div>
  <div class="slider-group">
    <label>Pointer Smoothing</label>
    <input type="range" id="pointerSmoothing" min="0" max="50" value="0">
    <span class="value" id="pointerSmoothingVal">0</span>
  </div>
  <div class="slider-group">
    <label>Brush Latency (b → c)</label>
    <input type="range" id="brushLatency" min="0" max="80" value="35">
    <span class="value" id="brushLatencyVal">35</span>
  </div>
  <div class="slider-group">
    <label>Brush Smoothing</label>
    <input type="range" id="brushSmoothing" min="0" max="50" value="0">
    <span class="value" id="brushSmoothingVal">0</span>
  </div>
  <div class="slider-group">
    <label>Pen Speed</label>
    <input type="range" id="penSpeed" min="5" max="100" value="7">
    <span class="value" id="penSpeedVal">7</span>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
