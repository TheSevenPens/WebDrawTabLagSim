<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drawing Tablet Lag Animator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2a2a2a;
    color: #eee;
    font-family: 'Google Sans Flex', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 1.4rem;
    margin-bottom: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  canvas {
    border-radius: 8px;
    cursor: default;
    display: block;
  }
  .controls {
    display: flex;
    gap: 32px;
    align-items: center;
    margin-top: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .slider-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .slider-group label {
    font-size: 0.85rem;
    font-weight: 600;
  }
  .slider-group .value {
    font-size: 0.75rem;
    color: #aaa;
  }
  input[type="range"] {
    width: 200px;
    accent-color: #e07040;
  }
  .main-row {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .legend {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 10px 0;
    font-size: 0.82rem;
    font-weight: 600;
    color: #aaa;
    white-space: nowrap;
  }
  .legend-spacer {
    height: 6px;
  }
  .checkboxes {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px 0;
  }
  .checkboxes label {
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
</style>
</head>
<body>
<h1>Drawing Tablet Lag Visualizer</h1>
<div class="main-row">
  <div class="legend">
    <div>a: pen tip</div>
    <div>b: OS pointer</div>
    <div>c: brush stroke</div>
    <div class="legend-spacer"></div>
    <div>a → b = pointer lag</div>
    <div>b → c = brush lag</div>
  </div>
  <canvas id="c"></canvas>
  <div class="checkboxes">
    <label><input type="checkbox" id="showLineAB" checked> Line a→b</label>
    <label><input type="checkbox" id="showLineBC" checked> Line b→c</label>
    <label><input type="checkbox" id="showA" checked> Label a</label>
    <label><input type="checkbox" id="showB" checked> Label b</label>
    <label><input type="checkbox" id="showC" checked> Label c</label>
    <label><input type="checkbox" id="showPointer" checked> OS pointer</label>
    <label><input type="checkbox" id="showCircleA" checked> Circle a</label>
    <label><input type="checkbox" id="showCircleB" checked> Circle b</label>
    <label><input type="checkbox" id="showCircleC" checked> Circle c</label>
  </div>
</div>
<div class="controls">
  <div class="slider-group">
    <label>Pointer Lag (a → b)</label>
    <input type="range" id="pointerLag" min="0" max="80" value="25">
    <span class="value" id="pointerLagVal">25</span>
  </div>
  <div class="slider-group">
    <label>Brush Lag (b → c)</label>
    <input type="range" id="brushLag" min="0" max="80" value="35">
    <span class="value" id="brushLagVal">35</span>
  </div>
  <div class="slider-group">
    <label>Pen Speed</label>
    <input type="range" id="penSpeed" min="5" max="100" value="7">
    <span class="value" id="penSpeedVal">7</span>
  </div>
</div>

<script>
// --- Constants ---
const FONT = '"Google Sans Flex", sans-serif';
const COLORS = {
  background: '#e8b84b',
  circle: '#d04040',
  label: '#222',
  legend: '#444',
  dashedLine: '#887860',
  pointer: '#7a7060',
  penBody: ['#1480e0', '#1a6fc4', '#0e5090'],
  penTip: '#c03030',
  brushStroke: [150, 120, 90],
  brushHighlight: [200, 170, 140],
};
const HISTORY_SIZE = 400;
const BRUSH_TRAIL_MAX = 180;
const TIME_STEP_SCALE = 0.001;

// Position configs for labels relative to their circle centers
const LABEL_OFFSETS = {
  a: { dx: -22, dy: 24, size: 22 },
  b: { dx: 0, dy: 34, size: 22 },
  c: { dx: 20, dy: 26, size: 24 },
};
const CIRCLE_RADII = { a: 16, b: 20, c: 24 };

// Legend lines drawn on the canvas
const LEGEND_LINES = [
  'a: pen tip',
  'b: OS pointer',
  'c: brush stroke',
  'a \u2192 b = pointer lag',
  'b \u2192 c = brush lag',
];

// --- State ---
const state = {
  pointerLag: 25,
  brushLag: 35,
  penSpeed: 7,
  showLineAB: true,
  showLineBC: true,
  showA: true,
  showB: true,
  showC: true,
  showPointer: true,
  showCircleA: true,
  showCircleB: true,
  showCircleC: true,
};

let posHistory = [];
let brushTrail = [];
let time = 0;

// --- Canvas setup ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  const w = Math.min(window.innerWidth - 40, 1100);
  canvas.width = w;
  canvas.height = Math.round(w * 0.5);
}
resize();
window.addEventListener('resize', resize);

// --- Controls binding ---
function bindSlider(id, stateKey) {
  const slider = document.getElementById(id);
  const display = document.getElementById(id + 'Val');
  slider.addEventListener('input', () => {
    state[stateKey] = +slider.value;
    display.textContent = slider.value;
  });
}

function bindCheckbox(id, stateKey) {
  document.getElementById(id).addEventListener('change', (e) => {
    state[stateKey] = e.target.checked;
  });
}

bindSlider('pointerLag', 'pointerLag');
bindSlider('brushLag', 'brushLag');
bindSlider('penSpeed', 'penSpeed');
bindCheckbox('showLineAB', 'showLineAB');
bindCheckbox('showLineBC', 'showLineBC');
bindCheckbox('showA', 'showA');
bindCheckbox('showB', 'showB');
bindCheckbox('showC', 'showC');
bindCheckbox('showPointer', 'showPointer');
bindCheckbox('showCircleA', 'showCircleA');
bindCheckbox('showCircleB', 'showCircleB');
bindCheckbox('showCircleC', 'showCircleC');

// --- Animation path ---
function autoPosition(t) {
  const cx = canvas.width * 0.5;
  const cy = canvas.height * 0.5;
  return {
    x: cx + canvas.width * 0.35 * Math.sin(t * 1.1),
    y: cy + canvas.height * 0.3 * Math.sin(t * 1.9),
  };
}

// --- History helpers ---
function getLaggedPos(lagFrames) {
  const idx = Math.max(0, posHistory.length - 1 - Math.round(lagFrames));
  return posHistory[idx] || posHistory[posHistory.length - 1] || { x: canvas.width / 2, y: canvas.height / 2 };
}

function pushHistory(pos) {
  posHistory.push({ x: pos.x, y: pos.y });
  if (posHistory.length > HISTORY_SIZE) posHistory.shift();
}

function pushBrushTrail(pos) {
  brushTrail.push({ x: pos.x, y: pos.y });
  if (brushTrail.length > BRUSH_TRAIL_MAX) brushTrail.shift();
}

// --- Drawing primitives ---
function drawDashedCircle(x, y, r, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 4]);
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawDashedLine(x1, y1, x2, y2) {
  ctx.save();
  ctx.strokeStyle = COLORS.dashedLine;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 5]);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawLabel(text, x, y, fontSize) {
  ctx.save();
  ctx.font = `bold italic ${fontSize}px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = COLORS.label;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawPen(x, y) {
  const H = 55, W = 12;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.2)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;
  const grad = ctx.createLinearGradient(x - W / 2, y - H, x + W / 2, y);
  grad.addColorStop(0, COLORS.penBody[0]);
  grad.addColorStop(0.7, COLORS.penBody[1]);
  grad.addColorStop(1, COLORS.penBody[2]);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(x - W / 2, y - H);
  ctx.lineTo(x + W / 2, y - H);
  ctx.lineTo(x + 3, y - 5);
  ctx.lineTo(x - 3, y - 5);
  ctx.closePath();
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.fillStyle = COLORS.penTip;
  ctx.beginPath();
  ctx.moveTo(x - 3, y - 5);
  ctx.lineTo(x + 3, y - 5);
  ctx.lineTo(x, y + 3);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawPointer(x, y) {
  ctx.save();
  ctx.strokeStyle = COLORS.pointer;
  ctx.lineWidth = 2;
  ctx.setLineDash([3, 3]);
  const s = 1.3;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x, y + 18 * s);
  ctx.lineTo(x + 5 * s, y + 13 * s);
  ctx.lineTo(x + 9 * s, y + 21 * s);
  ctx.lineTo(x + 12 * s, y + 19 * s);
  ctx.lineTo(x + 8 * s, y + 11 * s);
  ctx.lineTo(x + 14 * s, y + 11 * s);
  ctx.closePath();
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawBrushStroke(trail) {
  if (trail.length < 3) return;
  const [r, g, b] = COLORS.brushStroke;
  const [hr, hg, hb] = COLORS.brushHighlight;
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for (let i = 1; i < trail.length; i++) {
    const t = i / trail.length;
    ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${0.08 + t * 0.55})`;
    ctx.lineWidth = 1 + t * t * 35;
    ctx.beginPath();
    ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
    ctx.lineTo(trail[i].x, trail[i].y);
    ctx.stroke();
  }
  const halfLen = Math.floor(trail.length * 0.5);
  for (let i = halfLen; i < trail.length; i++) {
    const t = i / trail.length;
    const w = t * t * 20;
    ctx.strokeStyle = `rgba(${hr}, ${hg}, ${hb}, ${t * 0.15})`;
    ctx.lineWidth = w;
    ctx.beginPath();
    ctx.moveTo(trail[i - 1].x, trail[i - 1].y - w * 0.15);
    ctx.lineTo(trail[i].x, trail[i].y - w * 0.15);
    ctx.stroke();
  }
  ctx.restore();
}

function drawLegend(W, H) {
  ctx.save();
  ctx.font = `14px ${FONT}`;
  ctx.fillStyle = COLORS.legend;
  ctx.textAlign = 'left';
  const x = 18;
  const y = H - 112;
  LEGEND_LINES.forEach((line, i) => {
    ctx.fillText(line, x, y + i * 22);
  });
  ctx.restore();
}

// --- Composite drawing for each position ---
function drawPosition(pos, key, showCircle, showLabel) {
  const offset = LABEL_OFFSETS[key];
  const radius = CIRCLE_RADII[key];
  if (showCircle) drawDashedCircle(pos.x, pos.y, radius, COLORS.circle);
  if (showLabel) drawLabel(key, pos.x + offset.dx, pos.y + offset.dy, offset.size);
}

// --- Main render loop ---
function render() {
  time += state.penSpeed * TIME_STEP_SCALE;
  const W = canvas.width;
  const H = canvas.height;

  const posA = autoPosition(time);
  pushHistory(posA);

  const posB = getLaggedPos(state.pointerLag);
  const posC = getLaggedPos(state.pointerLag + state.brushLag);
  pushBrushTrail(posC);

  // Background
  ctx.fillStyle = COLORS.background;
  ctx.fillRect(0, 0, W, H);

  // Layers back to front
  drawBrushStroke(brushTrail);

  if (state.showLineAB) drawDashedLine(posA.x, posA.y + 3, posB.x, posB.y);
  if (state.showLineBC) drawDashedLine(posB.x, posB.y, posC.x, posC.y);

  drawPosition(posC, 'c', state.showCircleC, state.showC);
  if (state.showPointer) drawPointer(posB.x, posB.y);
  drawPosition(posB, 'b', state.showCircleB, state.showB);
  drawPen(posA.x, posA.y);
  drawPosition(posA, 'a', state.showCircleA, state.showA);

  requestAnimationFrame(render);
}

// --- Pre-warm animation ---
function preWarm() {
  for (let i = 0; i < HISTORY_SIZE; i++) {
    time += state.penSpeed * TIME_STEP_SCALE;
    pushHistory(autoPosition(time));
  }
  const totalLag = Math.round(state.pointerLag + state.brushLag);
  for (let i = 0; i < BRUSH_TRAIL_MAX; i++) {
    const idx = Math.max(0, posHistory.length - 1 - (BRUSH_TRAIL_MAX - i) - totalLag);
    if (idx >= 0 && idx < posHistory.length) {
      brushTrail.push({ x: posHistory[idx].x, y: posHistory[idx].y });
    }
  }
}

preWarm();
render();
</script>
</body>
</html>
