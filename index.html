<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drawing Tablet Lag Animator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2a2a2a;
    color: #eee;
    font-family: 'Google Sans Flex', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 1.4rem;
    margin-bottom: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  canvas {
    border-radius: 8px;
    cursor: default;
    display: block;
  }
  .controls {
    display: flex;
    gap: 32px;
    align-items: center;
    margin-top: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .slider-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .slider-group label {
    font-size: 0.85rem;
    font-weight: 600;
  }
  .slider-group .value {
    font-size: 0.75rem;
    color: #aaa;
  }
  input[type="range"] {
    width: 200px;
    accent-color: #e07040;
  }
</style>
</head>
<body>
<h1>Drawing Tablet Lag Visualizer</h1>
<canvas id="c"></canvas>
<div class="controls">
  <div class="slider-group">
    <label>Pointer Lag (a → b)</label>
    <input type="range" id="pointerLag" min="0" max="80" value="25">
    <span class="value" id="pointerLagVal">25</span>
  </div>
  <div class="slider-group">
    <label>Brush Lag (b → c)</label>
    <input type="range" id="brushLag" min="0" max="80" value="35">
    <span class="value" id="brushLagVal">35</span>
  </div>
  <div class="slider-group">
    <label>Pen Speed</label>
    <input type="range" id="penSpeed" min="5" max="100" value="7">
    <span class="value" id="penSpeedVal">7</span>
  </div>
  <div class="slider-group">
    <label><input type="checkbox" id="showLines" checked> Show connector lines</label>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Sizing
function resize() {
  const w = Math.min(window.innerWidth - 40, 1100);
  const h = Math.round(w * 0.5);
  canvas.width = w;
  canvas.height = h;
}
resize();
window.addEventListener('resize', resize);

// State
let pointerLag = 25;
let brushLag = 35;
let penSpeed = 7;
let showLines = true;
const HISTORY_SIZE = 400;
let posHistory = [];
let brushTrail = [];
const BRUSH_TRAIL_MAX = 180;
let time = 0;

// Slider events
const pSlider = document.getElementById('pointerLag');
const bSlider = document.getElementById('brushLag');
const pVal = document.getElementById('pointerLagVal');
const bVal = document.getElementById('brushLagVal');
const sSlider = document.getElementById('penSpeed');
const sVal = document.getElementById('penSpeedVal');
pSlider.addEventListener('input', () => { pointerLag = +pSlider.value; pVal.textContent = pSlider.value; });
bSlider.addEventListener('input', () => { brushLag = +bSlider.value; bVal.textContent = bSlider.value; });
sSlider.addEventListener('input', () => { penSpeed = +sSlider.value; sVal.textContent = sSlider.value; });
document.getElementById('showLines').addEventListener('change', (e) => { showLines = e.target.checked; });

// Auto path: sweeping curve that shows lag well
function autoPosition(t) {
  const W = canvas.width;
  const H = canvas.height;
  const cx = W * 0.5;
  const cy = H * 0.5;
  // Lissajous-like curve filling most of canvas
  return {
    x: cx + W * 0.35 * Math.sin(t * 1.1),
    y: cy + H * 0.3 * Math.sin(t * 1.9)
  };
}

// Get lagged position from history
function getLaggedPos(lagFrames) {
  const idx = Math.max(0, posHistory.length - 1 - Math.round(lagFrames));
  return posHistory[idx] || posHistory[posHistory.length - 1] || { x: canvas.width / 2, y: canvas.height / 2 };
}

// Draw pen stylus at position a
function drawPen(x, y) {
  const penH = 55;
  const penW = 12;
  ctx.save();
  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.2)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;
  // Pen body - gradient
  const grad = ctx.createLinearGradient(x - penW/2, y - penH, x + penW/2, y);
  grad.addColorStop(0, '#1480e0');
  grad.addColorStop(0.7, '#1a6fc4');
  grad.addColorStop(1, '#0e5090');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(x - penW/2, y - penH);
  ctx.lineTo(x + penW/2, y - penH);
  ctx.lineTo(x + 3, y - 5);
  ctx.lineTo(x - 3, y - 5);
  ctx.closePath();
  ctx.fill();
  ctx.shadowColor = 'transparent';
  // Tip
  ctx.fillStyle = '#c03030';
  ctx.beginPath();
  ctx.moveTo(x - 3, y - 5);
  ctx.lineTo(x + 3, y - 5);
  ctx.lineTo(x, y + 3);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// Draw dashed circle
function drawDashedCircle(x, y, r, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 4]);
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// Draw small cursor arrow
function drawCursorArrow(x, y, scale, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#8a7e6e';
  ctx.strokeStyle = '#6a6050';
  ctx.lineWidth = 0.5;
  const s = scale;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x, y + 14*s);
  ctx.lineTo(x + 4*s, y + 10*s);
  ctx.lineTo(x + 7*s, y + 16*s);
  ctx.lineTo(x + 9*s, y + 15*s);
  ctx.lineTo(x + 6*s, y + 9*s);
  ctx.lineTo(x + 10*s, y + 9*s);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

// Draw OS pointer (dashed outline cursor)
function drawPointer(x, y) {
  ctx.save();
  ctx.strokeStyle = '#7a7060';
  ctx.lineWidth = 2;
  ctx.setLineDash([3, 3]);
  const s = 1.3;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x, y + 18*s);
  ctx.lineTo(x + 5*s, y + 13*s);
  ctx.lineTo(x + 9*s, y + 21*s);
  ctx.lineTo(x + 12*s, y + 19*s);
  ctx.lineTo(x + 8*s, y + 11*s);
  ctx.lineTo(x + 14*s, y + 11*s);
  ctx.closePath();
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// Draw tapered brush stroke trail
function drawBrushStroke(trail) {
  if (trail.length < 3) return;
  ctx.save();
  // Draw from old to new so newest is on top
  for (let i = 1; i < trail.length; i++) {
    const t = i / trail.length; // 0=old, 1=newest
    const width = 1 + t * t * 35; // quadratic taper for more dramatic shape
    const alpha = 0.08 + t * 0.55;
    ctx.strokeStyle = `rgba(150, 120, 90, ${alpha})`;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(trail[i-1].x, trail[i-1].y);
    ctx.lineTo(trail[i].x, trail[i].y);
    ctx.stroke();
  }
  // Slight highlight on top edge of stroke
  for (let i = Math.floor(trail.length * 0.5); i < trail.length; i++) {
    const t = i / trail.length;
    const width = t * t * 20;
    ctx.strokeStyle = `rgba(200, 170, 140, ${t * 0.15})`;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(trail[i-1].x, trail[i-1].y - width * 0.15);
    ctx.lineTo(trail[i].x, trail[i].y - width * 0.15);
    ctx.stroke();
  }
  ctx.restore();
}

// Draw label with background for readability
function drawLabel(text, x, y, fontSize) {
  ctx.save();
  const fs = fontSize || 22;
  ctx.font = `bold italic ${fs}px 'Google Sans Flex', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#222';
  ctx.fillText(text, x, y);
  ctx.restore();
}

// Draw dashed line between two points
function drawDashedLine(x1, y1, x2, y2, color) {
  ctx.save();
  ctx.strokeStyle = color || '#887860';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 5]);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// Draw cursor arrow trail between two points
function drawArrowTrail(from, to, count) {
  if (count < 1) return;
  for (let i = 0; i <= count; i++) {
    const t = (i + 1) / (count + 2);
    const x = from.x + (to.x - from.x) * t;
    const y = from.y + (to.y - from.y) * t;
    const alpha = 0.25 + 0.45 * (1 - t);
    drawCursorArrow(x, y, 0.8, alpha);
  }
}

// Main render loop
function render() {
  time += penSpeed * 0.001;
  const W = canvas.width;
  const H = canvas.height;

  // Current pen position
  const penPos = autoPosition(time);

  // Push to history
  posHistory.push({ x: penPos.x, y: penPos.y });
  if (posHistory.length > HISTORY_SIZE) posHistory.shift();

  // Compute lagged positions
  const posA = penPos;
  const posB = getLaggedPos(pointerLag);
  const posC = getLaggedPos(pointerLag + brushLag);

  // Push brush trail
  brushTrail.push({ x: posC.x, y: posC.y });
  if (brushTrail.length > BRUSH_TRAIL_MAX) brushTrail.shift();

  // Clear and draw background
  ctx.fillStyle = '#e8b84b';
  ctx.fillRect(0, 0, W, H);

  // ---- Draw layers back to front ----

  // 1. Brush stroke trail (furthest back)
  drawBrushStroke(brushTrail);

  // 2. Connector lines (a to b, b to c)
  if (showLines) {
    drawDashedLine(posA.x, posA.y + 3, posB.x, posB.y);
    drawDashedLine(posB.x, posB.y, posC.x, posC.y);
  }

  // 7. Draw position c - brush head (red dashed circle)
  drawDashedCircle(posC.x, posC.y, 24, '#d04040');
  drawLabel('c', posC.x, posC.y + 40, 24);

  // 8. Draw position b - OS pointer
  drawPointer(posB.x, posB.y);
  drawDashedCircle(posB.x, posB.y, 20, '#d04040');
  drawLabel('b', posB.x, posB.y + 34, 22);

  // 9. Draw position a - pen tip (on top of everything)
  drawPen(posA.x, posA.y);
  drawDashedCircle(posA.x, posA.y, 16, '#d04040');
  drawLabel('a', posA.x, posA.y + 32, 22);

  // ---- Legend (bottom-left) ----
  ctx.save();
  ctx.font = '14px "Google Sans Flex", sans-serif';
  ctx.fillStyle = '#444';
  ctx.textAlign = 'left';
  const lx = 18;
  const ly = H - 68;
  ctx.fillText('a: pen tip   b: OS pointer   c: brush stroke', lx, ly);
  ctx.fillText('a → b = pointer lag', lx, ly + 22);
  ctx.fillText('b → c = brush lag', lx, ly + 42);
  ctx.restore();

  requestAnimationFrame(render);
}

// Pre-warm: simulate several seconds of animation so it starts with spread
for (let i = 0; i < HISTORY_SIZE; i++) {
  time += penSpeed * 0.001;
  const p = autoPosition(time);
  posHistory.push({ x: p.x, y: p.y });
}
// Pre-warm brush trail too
for (let i = 0; i < BRUSH_TRAIL_MAX; i++) {
  const idx = Math.max(0, posHistory.length - 1 - (BRUSH_TRAIL_MAX - i) - Math.round(pointerLag + brushLag));
  if (idx >= 0 && idx < posHistory.length) {
    brushTrail.push({ x: posHistory[idx].x, y: posHistory[idx].y });
  }
}

render();
</script>
</body>
</html>
